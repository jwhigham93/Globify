<!DOCTYPE html>
<html lang="en" style="background:#000;height:100%">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no"/>
  <meta name="theme-color" content="#000000"/>
  <title>Globify</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #000; height: 100%; }
    #root { height: 100%; }

    #loading-shell {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 9999;
      transition: opacity 0.3s ease;
    }
    #loading-shell.hidden { opacity: 0; pointer-events: none; }

    .spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255, 255, 255, 0.12);
      border-top-color: rgba(255, 255, 255, 0.85);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-label {
      color: rgba(255, 255, 255, 0.35);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div id="loading-shell">
    <div class="spinner"></div>
    <span class="loading-label">Globify</span>
  </div>
  <div id="root"></div>
  <script>
    // Hide the shell overlay once React has mounted
    window.__hideLoadingShell = function () {
      var el = document.getElementById('loading-shell');
      if (el) {
        el.classList.add('hidden');
        setTimeout(function () { el.remove(); }, 350);
      }
    };
  </script>
</body>
</html>
