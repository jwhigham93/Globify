apiVersion: batch/v1
kind: Job
metadata:
  name: supply-chain-migrate
  namespace: supply-chain
  labels:
    app.kubernetes.io/name: supply-chain-api
    app.kubernetes.io/component: migration
    app.kubernetes.io/part-of: supply-chain-api
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: supply-chain-api
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: migrate/migrate:v4.17.0
          args:
            - "-path"
            - "/migrations"
            - "-database"
            - "$(DATABASE_URL)"
            - "up"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supply-chain-db-secret
                  key: DATABASE_URL
          volumeMounts:
            - name: migrations
              mountPath: /migrations
              readOnly: true
      initContainers:
        # Copy migrations from the API image into a shared volume
        - name: copy-migrations
          # Replace with your ECR image URI
          image: "<ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/supply-chain-api:latest"
          command: ["cp", "-r", "/migrations/.", "/shared-migrations/"]
          volumeMounts:
            - name: migrations
              mountPath: /shared-migrations
      volumes:
        - name: migrations
          emptyDir: {}
