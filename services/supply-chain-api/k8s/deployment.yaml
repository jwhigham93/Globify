apiVersion: apps/v1
kind: Deployment
metadata:
  name: supply-chain-api
  namespace: supply-chain
  labels:
    app.kubernetes.io/name: supply-chain-api
    app.kubernetes.io/part-of: supply-chain-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: supply-chain-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: supply-chain-api
    spec:
      containers:
        - name: api
          # Replace <ACCOUNT_ID> and <REGION> with your values, or use the ECR URI from CDK output
          image: "<ACCOUNT_ID>.dkr.ecr.<REGION>.amazonaws.com/supply-chain-api:latest"
          ports:
            - containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: supply-chain-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: supply-chain-db-secret
                  key: DATABASE_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always
