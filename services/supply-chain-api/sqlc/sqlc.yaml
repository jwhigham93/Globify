version: "2"
sql:
  - engine: "postgresql"
    queries: "queries/"
    schema:
      - "../migrations/000001_initial_schema.up.sql"
      - "../migrations/000002_seed_data.up.sql"
    gen:
      go:
        package: "db"
        out: "../internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        json_tags_case_style: "camel"
        emit_empty_slices: true
