services:
  postgres:
    image: postgres:16-alpine
    container_name: supply-chain-db
    environment:
      POSTGRES_USER: supplychain
      POSTGRES_PASSWORD: supplychain_dev
      POSTGRES_DB: supplychain
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supplychain"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
