name: Deploy Web

on:
  push:
    branches: [main]
    paths:
      - 'apps/Globify/**'
      - 'services/supply-chain-api/**'
      - '.github/workflows/deploy-web.yml'
  workflow_dispatch:

jobs:
  deploy-frontend:
    name: Build & Deploy Globify Web
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export web bundle
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.EXPO_PUBLIC_COGNITO_USER_POOL_ID }}
          EXPO_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_COGNITO_CLIENT_ID }}
          EXPO_PUBLIC_COGNITO_REGION: ${{ secrets.EXPO_PUBLIC_COGNITO_REGION }}
        run: pnpm nx export Globify -- --platform web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        env:
          WEB_BUCKET_NAME: ${{ secrets.WEB_BUCKET_NAME }}
        run: aws s3 sync apps/Globify/dist "s3://$WEB_BUCKET_NAME" --delete

      - name: Invalidate CloudFront
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths '/*'

  deploy-backend:
    name: Build & Deploy Lambda
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: services/supply-chain-api/go.sum

      - name: Build Lambda binary
        working-directory: services/supply-chain-api
        run: |
          mkdir -p dist/pkg
          cp -r migrations dist/pkg/
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o dist/pkg/bootstrap ./cmd/server
          cd dist/pkg && python3 -c "
          import zipfile, os
          with zipfile.ZipFile('../lambda.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              zf.write('bootstrap', 'bootstrap')
              for root, dirs, files in os.walk('migrations'):
                  for file in files:
                      path = os.path.join(root, file)
                      zf.write(path, path)
          "

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy CDK stacks
        working-directory: infra/cdk
        run: npx cdk deploy SupplyChainLambdaApi --require-approval never -c profile=ultra-lite
