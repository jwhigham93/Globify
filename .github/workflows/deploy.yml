name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend (Globify Web)
    runs-on: ubuntu-latest
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJson(github.event.commits.*.modified), 'apps/Globify') ||
      contains(toJson(github.event.commits.*.added), 'apps/Globify')

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export web bundle
        env:
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.EXPO_PUBLIC_COGNITO_USER_POOL_ID }}
          EXPO_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_COGNITO_CLIENT_ID }}
          EXPO_PUBLIC_COGNITO_REGION: ${{ secrets.EXPO_PUBLIC_COGNITO_REGION }}
          EXPO_PUBLIC_WS_URL: ${{ secrets.EXPO_PUBLIC_WS_URL }}
          EXPO_PUBLIC_COGNITO_DOMAIN: ${{ secrets.EXPO_PUBLIC_COGNITO_DOMAIN }}
        run: pnpm nx export Globify -- --platform web

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Sync to S3
        env:
          WEB_BUCKET_NAME: ${{ secrets.WEB_BUCKET_NAME }}
        run: aws s3 sync apps/Globify/dist "s3://$WEB_BUCKET_NAME" --delete

      - name: Invalidate CloudFront
        env:
          CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" \
            --paths '/*'

  # ── Backend ───────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend (Lambda)
    runs-on: ubuntu-latest
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJson(github.event.commits.*.modified), 'services/supply-chain-api') ||
      contains(toJson(github.event.commits.*.added), 'services/supply-chain-api')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: services/supply-chain-api/go.sum

      - name: Build Lambda zip
        working-directory: services/supply-chain-api
        run: |
          mkdir -p dist/pkg
          cp -r migrations dist/pkg/
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o dist/pkg/bootstrap ./cmd/server
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('dist/lambda.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              zf.write('dist/pkg/bootstrap', 'bootstrap')
              for root, dirs, files in os.walk('dist/pkg/migrations'):
                  for file in files:
                      path = os.path.join(root, file)
                      arc = path.replace('dist/pkg/', '', 1)
                      zf.write(path, arc)
          print('zip size:', os.path.getsize('dist/lambda.zip'), 'bytes')
          "

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name supply-chain-api \
            --zip-file fileb://services/supply-chain-api/dist/lambda.zip \
            --region us-east-1

      - name: Wait for update to complete
        run: |
          aws lambda wait function-updated \
            --function-name supply-chain-api \
            --region us-east-1

  # ── Infra (CDK) ───────────────────────────────────────────────────────────
  deploy-infra:
    name: Deploy Infrastructure (CDK)
    runs-on: ubuntu-latest
    environment: production
    if: |
      github.event_name == 'workflow_dispatch' ||
      contains(toJson(github.event.commits.*.modified), 'infra/cdk') ||
      contains(toJson(github.event.commits.*.added), 'infra/cdk')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: infra/cdk/go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      - name: Build Lambda zip (CDK asset)
        working-directory: services/supply-chain-api
        run: |
          mkdir -p dist/pkg
          cp -r migrations dist/pkg/
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o dist/pkg/bootstrap ./cmd/server
          python3 -c "
          import zipfile, os
          with zipfile.ZipFile('dist/lambda.zip', 'w', zipfile.ZIP_DEFLATED) as zf:
              zf.write('dist/pkg/bootstrap', 'bootstrap')
              for root, dirs, files in os.walk('dist/pkg/migrations'):
                  for file in files:
                      path = os.path.join(root, file)
                      arc = path.replace('dist/pkg/', '', 1)
                      zf.write(path, arc)
          "

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: CDK deploy
        env:
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          CDK_COGNITO_USER_POOL_ID: ${{ secrets.EXPO_PUBLIC_COGNITO_USER_POOL_ID }}
          CDK_COGNITO_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_COGNITO_CLIENT_ID }}
        run: |
          cdk deploy --all -c profile=ultra-lite --require-approval never \
            -c cognitoUserPoolId="$CDK_COGNITO_USER_POOL_ID" \
            -c cognitoClientId="$CDK_COGNITO_CLIENT_ID"
